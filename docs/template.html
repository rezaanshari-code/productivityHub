<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Performance & Productivity Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242736;--border:#2e3147;--ahi:#3b82f6;--hci:#f59e0b;--all:#8b5cf6;--text:#e2e8f0;--muted:#8892a4;--green:#10b981;--cyan:#06b6d4;--red:#ef4444;--sidebar:220px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:14px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:52px;flex-shrink:0}
.topbar-brand{font-size:15px;font-weight:700}
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.filter-label{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.date-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px}
.date-input:focus{outline:none;border-color:var(--all)}
.filter-btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.filter-btn:hover{color:var(--text)}
.presets{display:flex;gap:5px;flex-wrap:wrap}
.preset{padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s}
.preset:hover{color:var(--text);border-color:var(--all)}
.preset.active{background:var(--all);color:#fff;border-color:var(--all)}
.filter-info{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px 0}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-group-label{padding:8px 14px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;color:var(--muted);font-size:12px;font-weight:500;transition:all .15s;border-left:3px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{background:var(--surface2);color:var(--text);border-left-color:var(--all)}
.sidebar-item.active.ahi{border-left-color:var(--ahi)}
.sidebar-item.active.hci{border-left-color:var(--hci)}
.sidebar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-all{background:var(--all)}.dot-ahi{background:var(--ahi)}.dot-hci{background:var(--hci)}
.content{flex:1;overflow-y:auto;padding:20px}
.content::-webkit-scrollbar{width:6px}.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.page{display:none;max-width:1400px;margin:0 auto}
.page.active{display:block}

/* PAGE TABS (Overview / Insight) */
.page-tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.page-tab{padding:8px 18px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
.page-tab:hover{color:var(--text)}
.page-tab.active{color:var(--text);border-bottom-color:var(--all)}
.tab-content{display:none}.tab-content.active{display:block}

.sec-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-all{background:var(--all);color:#fff}.badge-ahi{background:var(--ahi);color:#fff}.badge-hci{background:var(--hci);color:#000}
.sec-title{font-size:20px;font-weight:700}
.sec-sub{color:var(--muted);font-size:12px;margin-top:2px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:700;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px}
.t-blue{border-top:3px solid var(--ahi)}.t-yellow{border-top:3px solid var(--hci)}.t-green{border-top:3px solid var(--green)}.t-cyan{border-top:3px solid var(--cyan)}.t-purple{border-top:3px solid var(--all)}.t-red{border-top:3px solid var(--red)}

/* TABLE */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.tbl-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.tbl-title{font-weight:600;font-size:13px}
.tbl-search{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;color:var(--text);font-size:12px;width:170px}
.tbl-search:focus{outline:none;border-color:var(--all)}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);padding:8px 10px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.rank{width:26px;color:var(--muted);font-weight:700;font-size:11px}
.r1{color:#fbbf24}.r2{color:#94a3b8}.r3{color:#cd7c3b}

/* SUB NAV */
.sub-nav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.sub-tab{padding:5px 12px;border-radius:6px;cursor:pointer;color:var(--muted);font-size:12px;border:1px solid var(--border);background:var(--surface);transition:all .15s}
.sub-tab:hover{color:var(--text);border-color:var(--all)}
.sub-tab.active{background:var(--surface2);color:var(--text);border-color:var(--all)}
.sec-block{display:none}.sec-block.active{display:block}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:1100px){.chart-grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.chart-grid,.chart-grid-3{grid-template-columns:1fr}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.chart-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative;height:220px}

.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:900px){.summary-grid{grid-template-columns:1fr}}
.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.tag-ahi{background:rgba(59,130,246,.2);color:var(--ahi)}.tag-hci{background:rgba(245,158,11,.2);color:var(--hci)}
.empty{text-align:center;padding:40px;color:var(--muted)}
.footer{text-align:center;padding:8px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);flex-shrink:0}
.ratio-val{color:var(--cyan);font-weight:600}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-brand">📦 Hub Dashboard</div></div>
<div class="filter-bar">
  <span class="filter-label">📅 Filter:</span>
  <input type="date" id="dateFrom" class="date-input" onchange="applyFilter()">
  <span style="color:var(--muted);font-size:12px">s/d</span>
  <input type="date" id="dateTo" class="date-input" onchange="applyFilter()">
  <button class="filter-btn" onclick="resetFilter()">Reset</button>
  <div class="presets">
    <button class="preset" onclick="setPreset('today',this)">Hari Ini</button>
    <button class="preset" onclick="setPreset('week',this)">7 Hari</button>
    <button class="preset" onclick="setPreset('month',this)">Bulan Ini</button>
    <button class="preset" onclick="setPreset('3month',this)">3 Bulan</button>
    <button class="preset active" onclick="setPreset('all',this)">Semua</button>
  </div>
  <span class="filter-info" id="filterInfo"></span>
</div>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content"><div id="pages"></div></div>
</div>
<div class="footer">Dashboard Performance & Productivity Hub &nbsp;|&nbsp; *Status LC "New" dikecualikan &nbsp;|&nbsp; Auto-update 08:00 WIB</div>

<script>
const RAW = RAW_DATA_PLACEHOLDER;

const HUBS     = [...new Set(RAW.map(r=>r.hub))];
const AHI_HUBS = HUBS.filter(h=>RAW.find(r=>r.hub===h)?.bu==='AHI');
const HCI_HUBS = HUBS.filter(h=>RAW.find(r=>r.hub===h)?.bu==='HCI');

const NAV = [
  {id:'all', label:'🌐 ALL Hub', cls:'', dotCls:'dot-all'},
  {id:'hci', label:'🟡 ALL HUB HCI', cls:'hci', dotCls:'dot-hci', group:'HCI'},
  ...HCI_HUBS.map((h,i)=>({id:'hci_'+i, label:'Hub '+h, cls:'hci', dotCls:'dot-hci', hub:h})),
  {id:'ahi', label:'🔵 ALL HUB AHI', cls:'ahi', dotCls:'dot-ahi', group:'AHI'},
  ...AHI_HUBS.map((h,i)=>({id:'ahi_'+i, label:'Hub '+h, cls:'ahi', dotCls:'dot-ahi', hub:h})),
];
const HUB_PAGE = {};
HCI_HUBS.forEach((h,i)=>HUB_PAGE[h]='hci_'+i);
AHI_HUBS.forEach((h,i)=>HUB_PAGE[h]='ahi_'+i);

const sidebar=document.getElementById('sidebar'), pagesDiv=document.getElementById('pages');
NAV.forEach(n=>{
  if(n.group){const l=document.createElement('div');l.className='sidebar-group-label';l.textContent=n.group==='HCI'?'BU HCI':'BU AHI';sidebar.appendChild(l);}
  const item=document.createElement('div');
  item.className=`sidebar-item ${n.cls}`;item.dataset.page=n.id;
  item.innerHTML=`<span class="sidebar-dot ${n.dotCls}"></span>${n.label}`;
  item.onclick=()=>showPage(n.id);sidebar.appendChild(item);
  const page=document.createElement('div');page.className='page';page.id='page-'+n.id;pagesDiv.appendChild(page);
});

// ── Date filter ───────────────────────────────────────────────────────────────
const allDates=[...new Set(RAW.map(r=>r.d).filter(Boolean))].sort();
const minDate=allDates[0], maxDate=allDates[allDates.length-1];
document.getElementById('dateFrom').value=minDate;
document.getElementById('dateTo').value=maxDate;
let filterFrom=minDate, filterTo=maxDate;

function setPreset(p,btn){
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const d=new Date(maxDate);let from=minDate;
  if(p==='today')from=maxDate;
  else if(p==='week'){d.setDate(d.getDate()-6);from=d.toISOString().split('T')[0];}
  else if(p==='month')from=maxDate.substring(0,7)+'-01';
  else if(p==='3month'){d.setMonth(d.getMonth()-2);from=d.toISOString().split('T')[0].substring(0,7)+'-01';}
  document.getElementById('dateFrom').value=from;document.getElementById('dateTo').value=maxDate;
  filterFrom=from;filterTo=maxDate;rebuildAll();
}
function applyFilter(){
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));
  filterFrom=document.getElementById('dateFrom').value;filterTo=document.getElementById('dateTo').value;rebuildAll();
}
function resetFilter(){
  document.getElementById('dateFrom').value=minDate;document.getElementById('dateTo').value=maxDate;
  filterFrom=minDate;filterTo=maxDate;
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));
  document.querySelector('.preset[onclick*="all"]').classList.add('active');rebuildAll();
}
function filtered(rows){return rows.filter(r=>!r.d||(r.d>=filterFrom&&r.d<=filterTo));}

// ── Metrics ───────────────────────────────────────────────────────────────────
function metrics(rows){
  if(!rows.length)return{trips:0,total_do:0,do_cust:0,do_store:0,total_dp:0,total_cost:0,total_ujp:0,bbm_ujp:0,jarak_km:0,tat_avg:'N/A',
    do_per_trip:0,dp_per_trip:0,ujp_per_trip:0,cost_per_trip:0,bbm_per_trip:0,km_per_trip:0};
  const tats=rows.filter(r=>r.tat!=null);
  const avg=tats.length?tats.reduce((s,r)=>s+r.tat,0)/tats.length:null;
  const h=avg!=null?Math.floor(avg/60):0,m=avg!=null?Math.round(avg%60):0;
  const n=rows.length;
  const total_do=rows.reduce((s,r)=>s+r.do,0);
  const total_dp=rows.reduce((s,r)=>s+(r.dp||0),0);
  const total_cost=rows.reduce((s,r)=>s+r.cost,0);
  const total_ujp=rows.reduce((s,r)=>s+r.ujp,0);
  const bbm_ujp=rows.reduce((s,r)=>s+r.bbm,0);
  const jarak_km=rows.reduce((s,r)=>s+r.km,0);
  return{
    trips:n, total_do, do_cust:rows.reduce((s,r)=>s+r.doc,0), do_store:rows.reduce((s,r)=>s+r.dos,0),
    total_dp, total_cost, total_ujp, bbm_ujp, jarak_km,
    tat_avg:avg!=null?`${h}:${String(m).padStart(2,'0')}`:'N/A',
    do_per_trip:n?+(total_do/n).toFixed(1):0,
    dp_per_trip:n?+(total_dp/n).toFixed(1):0,
    ujp_per_trip:n?Math.round(total_ujp/n):0,
    cost_per_trip:n?Math.round(total_cost/n):0,
    bbm_per_trip:n?Math.round(bbm_ujp/n):0,
    km_per_trip:n?+(jarak_km/n).toFixed(1):0,
  };
}
function groupBy(rows,key){const m={};rows.forEach(r=>{const k=r[key]||'(kosong)';if(!m[k])m[k]=[];m[k].push(r);});return m;}
const fmt=n=>n==null||isNaN(n)?'-':Math.round(n).toLocaleString('id-ID');
const fmtD=n=>n==null||isNaN(n)?'-':Number(n).toLocaleString('id-ID',{maximumFractionDigits:1});
const fmtM=n=>{if(!n||isNaN(n))return '-';if(n>=1e9)return(n/1e9).toFixed(2)+' M';if(n>=1e6)return(n/1e6).toFixed(1)+' Jt';if(n>=1e3)return(n/1e3).toFixed(0)+' Rb';return fmt(n);};

// ── KPI ───────────────────────────────────────────────────────────────────────
function kpiHTML(m){
  return `<div class="kpi-grid">
    <div class="kpi t-blue"><div class="kpi-label">Total Trip</div><div class="kpi-value">${fmt(m.trips)}</div><div class="kpi-sub">Pengiriman aktif</div></div>
    <div class="kpi t-cyan"><div class="kpi-label">Total DO</div><div class="kpi-value">${fmt(m.total_do)}</div><div class="kpi-sub">Cust: ${fmt(m.do_cust)} | Store: ${fmt(m.do_store)}</div></div>
    <div class="kpi t-green"><div class="kpi-label">TAT Rata-rata</div><div class="kpi-value">${m.tat_avg}</div><div class="kpi-sub">Jam:Menit per trip</div></div>
    <div class="kpi t-yellow"><div class="kpi-label">Jarak KM</div><div class="kpi-value">${fmt(m.jarak_km)}</div><div class="kpi-sub">${fmtD(m.km_per_trip)} km/trip</div></div>
    <div class="kpi t-purple"><div class="kpi-label">Total Cost</div><div class="kpi-value">${fmtM(m.total_cost)}</div><div class="kpi-sub">${fmtM(m.cost_per_trip)}/trip</div></div>
    <div class="kpi t-blue"><div class="kpi-label">Total UJP</div><div class="kpi-value">${fmtM(m.total_ujp)}</div><div class="kpi-sub">${fmtM(m.ujp_per_trip)}/trip</div></div>
    <div class="kpi t-cyan"><div class="kpi-label">Biaya BBM</div><div class="kpi-value">${fmtM(m.bbm_ujp)}</div><div class="kpi-sub">${fmtM(m.bbm_per_trip)}/trip</div></div>
    <div class="kpi t-green"><div class="kpi-label">DO/Trip</div><div class="kpi-value">${fmtD(m.do_per_trip)}</div><div class="kpi-sub">Rata-rata DO per trip</div></div>
    <div class="kpi t-red"><div class="kpi-label">DP/Trip</div><div class="kpi-value">${fmtD(m.dp_per_trip)}</div><div class="kpi-sub">Rata-rata DP per trip</div></div>
  </div>`;
}

// ── Tables ────────────────────────────────────────────────────────────────────
function ratioTds(m){
  return `<td class="num ratio-val">${fmtD(m.do_per_trip)}</td>
    <td class="num ratio-val">${fmtD(m.dp_per_trip)}</td>
    <td class="num ratio-val">${fmtM(m.ujp_per_trip)}</td>
    <td class="num ratio-val">${fmtM(m.cost_per_trip)}</td>
    <td class="num ratio-val">${fmtM(m.bbm_per_trip)}</td>
    <td class="num ratio-val">${fmtD(m.km_per_trip)}</td>`;
}
const ratioThs=`<th class="num">DO/Trip</th><th class="num">DP/Trip</th><th class="num">UJP/Trip</th><th class="num">Cost/Trip</th><th class="num">BBM/Trip</th><th class="num">KM/Trip</th>`;

function jalurHTML(rows,uid){
  const e=Object.entries(groupBy(rows,'jalur')).map(([j,rs])=>({j,m:metrics(rs)})).sort((a,b)=>b.m.trips-a.m.trips);
  if(!e.length)return`<div class="empty">📭 Tidak ada data</div>`;
  const tr=e.map(({j,m},i)=>`<tr>
    <td class="rank ${i<3?'r'+(i+1):''}">${i+1}</td><td>${j}</td>
    <td class="num">${fmt(m.trips)}</td><td class="num">${fmt(m.total_do)}</td>
    <td class="num">${fmt(m.do_cust)}</td><td class="num">${fmt(m.do_store)}</td>
    <td class="num">${m.tat_avg}</td><td class="num">${fmt(m.jarak_km)}</td>
    <td class="num">${fmtM(m.total_cost)}</td><td class="num">${fmtM(m.total_ujp)}</td><td class="num">${fmtM(m.bbm_ujp)}</td>
    ${ratioTds(m)}</tr>`).join('');
  return `<div class="tbl-wrap"><div class="tbl-head"><div class="tbl-title">📍 Analisa Per Jalur</div>
    <input class="tbl-search" placeholder="Cari jalur..." oninput="ftbl(this,'${uid}')"></div>
    <div style="overflow-x:auto"><table id="${uid}"><thead><tr>
    <th class="rank">#</th><th>Jalur</th><th class="num">Trip</th><th class="num">Total DO</th>
    <th class="num">DO Cust</th><th class="num">DO Store</th><th class="num">TAT</th>
    <th class="num">KM</th><th class="num">Total Cost</th><th class="num">Total UJP</th><th class="num">BBM</th>
    ${ratioThs}</tr></thead><tbody>${tr}</tbody></table></div></div>`;
}

function hubTableHTML(fRows,hubList,color){
  const rows=hubList.map(hub=>{
    const hr=fRows.filter(r=>r.hub===hub),m=metrics(hr),pid=HUB_PAGE[hub];
    return `<tr><td style="cursor:pointer;color:var(--${color})" onclick="showPage('${pid}')">Hub ${hub}</td>
      <td class="num">${fmt(m.trips)}</td><td class="num">${fmt(m.total_do)}</td>
      <td class="num">${fmt(m.do_cust)}</td><td class="num">${fmt(m.do_store)}</td>
      <td class="num">${m.tat_avg}</td><td class="num">${fmt(m.jarak_km)}</td>
      <td class="num">${fmtM(m.total_cost)}</td><td class="num">${fmtM(m.total_ujp)}</td><td class="num">${fmtM(m.bbm_ujp)}</td>
      ${ratioTds(m)}</tr>`;
  }).join('');
  return `<div class="tbl-wrap" style="margin-bottom:20px">
    <div class="tbl-head"><div class="tbl-title">📦 Detail Per Hub</div></div>
    <div style="overflow-x:auto"><table><thead><tr>
    <th>Hub</th><th class="num">Trip</th><th class="num">Total DO</th><th class="num">DO Cust</th><th class="num">DO Store</th>
    <th class="num">TAT</th><th class="num">KM</th><th class="num">Total Cost</th><th class="num">Total UJP</th><th class="num">BBM</th>
    ${ratioThs}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function personHTML(rows,col,title,uid){
  const src=rows.filter(r=>r[col]&&r[col]!='nan'&&r[col]!='');
  const e=Object.entries(groupBy(src,col)).map(([n,rs])=>({n,m:metrics(rs)})).sort((a,b)=>b.m.trips-a.m.trips).slice(0,50);
  if(!e.length)return`<div class="empty">📭 Tidak ada data</div>`;
  const tr=e.map(({n,m},i)=>`<tr>
    <td class="rank ${i<3?'r'+(i+1):''}">${i+1}</td><td>${n}</td>
    <td class="num">${fmt(m.trips)}</td><td class="num">${fmt(m.total_do)}</td>
    <td class="num">${fmt(m.do_cust)}</td><td class="num">${fmt(m.do_store)}</td>
    <td class="num">${m.tat_avg}</td><td class="num">${fmt(m.jarak_km)}</td>
    <td class="num">${fmtM(m.total_cost)}</td>${ratioTds(m)}</tr>`).join('');
  return `<div class="tbl-wrap"><div class="tbl-head"><div class="tbl-title">${title}</div>
    <input class="tbl-search" placeholder="Cari nama..." oninput="ftbl(this,'${uid}')"></div>
    <div style="overflow-x:auto"><table id="${uid}"><thead><tr>
    <th class="rank">#</th><th>Nama</th><th class="num">Trip</th><th class="num">Total DO</th>
    <th class="num">DO Cust</th><th class="num">DO Store</th><th class="num">TAT</th>
    <th class="num">KM</th><th class="num">Total Cost</th>${ratioThs}
    </tr></thead><tbody>${tr}</tbody></table></div></div>`;
}
function ftbl(inp,id){const q=inp.value.toLowerCase();document.getElementById(id)?.querySelectorAll('tbody tr').forEach(tr=>tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none');}

// ── SUB NAV ───────────────────────────────────────────────────────────────────
function subNav(pid){return`<div class="sub-nav">
  <button class="sub-tab active" onclick="showSub(this,'${pid}','j')">📍 Per Jalur</button>
  <button class="sub-tab" onclick="showSub(this,'${pid}','d')">🚗 Driver</button>
  <button class="sub-tab" onclick="showSub(this,'${pid}','a')">👤 Asst Driver</button>
</div>`;}
function showSub(btn,pid,sec){
  btn.closest('.sub-nav').querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll(`[id^="${pid}-"]`).forEach(s=>s.classList.remove('active'));
  document.getElementById(`${pid}-${sec}`)?.classList.add('active');
}
function secBlocks(pid,rows){return`${subNav(pid)}
  <div id="${pid}-j" class="sec-block active">${jalurHTML(rows,'t'+pid+'j')}</div>
  <div id="${pid}-d" class="sec-block">${personHTML(rows,'drv','🚗 Top Driver','t'+pid+'d')}</div>
  <div id="${pid}-a" class="sec-block">${personHTML(rows,'ast','👤 Top Asisten Driver','t'+pid+'a')}</div>`;}

// ── CHARTS ────────────────────────────────────────────────────────────────────
const chartInstances={};
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}

function mkChart(id,type,labels,datasets,opts={}){
  destroyChart(id);
  const ctx=document.getElementById(id)?.getContext('2d');
  if(!ctx)return;
  chartInstances[id]=new Chart(ctx,{type,data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#8892a4',font:{size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label||''}: ${ctx.parsed.y!=null?ctx.parsed.y.toLocaleString('id-ID'):ctx.parsed}`}}},
    scales:type==='doughnut'||type==='pie'?{}:{x:{ticks:{color:'#8892a4',font:{size:10}},grid:{color:'#2e3147'}},y:{ticks:{color:'#8892a4',font:{size:10}},grid:{color:'#2e3147'}}},
    ...opts
  }});
}

const COLORS=['#3b82f6','#f59e0b','#10b981','#8b5cf6','#ef4444','#06b6d4','#f97316','#ec4899','#84cc16','#14b8a6','#a855f7','#eab308','#6366f1','#22c55e','#0ea5e9','#d946ef','#fb923c','#4ade80','#38bdf8','#c084fc'];

function buildInsight(pid,fRows,hubList){
  // Trend trip per bulan
  const byMonth={};
  fRows.forEach(r=>{if(!r.d)return;const ym=r.d.substring(0,7);if(!byMonth[ym])byMonth[ym]={trips:0,cost:0,do:0};byMonth[ym].trips++;byMonth[ym].cost+=r.cost;byMonth[ym].do+=r.do;});
  const months=Object.keys(byMonth).sort();

  // Per hub metrics
  const hubMetrics=(hubList||HUBS).map(h=>({h,m:metrics(fRows.filter(r=>r.hub===h))}));

  setTimeout(()=>{
    // Chart 1: Trip per bulan
    mkChart(pid+'_c1','bar',months,
      [{label:'Trip',data:months.map(m=>byMonth[m].trips),backgroundColor:'#3b82f6',borderRadius:4}]);
    // Chart 2: Cost per bulan
    mkChart(pid+'_c2','bar',months,
      [{label:'Total Cost',data:months.map(m=>Math.round(byMonth[m].cost/1e6)),backgroundColor:'#8b5cf6',borderRadius:4}]);
    // Chart 3: DO Cust vs DO Store
    const dcSum=fRows.reduce((s,r)=>s+r.doc,0),dsSum=fRows.reduce((s,r)=>s+r.dos,0);
    mkChart(pid+'_c3','doughnut',['DO Cust','DO Store'],
      [{data:[dcSum,dsSum],backgroundColor:['#3b82f6','#f59e0b'],borderWidth:0}]);
    // Chart 4: Trip per hub
    if(hubMetrics.length>1){
      mkChart(pid+'_c4','bar',hubMetrics.map(x=>'Hub '+x.h.replace(/^(AHI|HCI)\s/,'')),
        [{label:'Trip',data:hubMetrics.map(x=>x.m.trips),backgroundColor:COLORS,borderRadius:4}],
        {plugins:{legend:{display:false}}});
    }
    // Chart 5: Cost/Trip per hub
    if(hubMetrics.length>1){
      mkChart(pid+'_c5','bar',hubMetrics.map(x=>'Hub '+x.h.replace(/^(AHI|HCI)\s/,'')),
        [{label:'Cost/Trip (Rb)',data:hubMetrics.map(x=>Math.round(x.m.cost_per_trip/1e3)),backgroundColor:COLORS,borderRadius:4}],
        {plugins:{legend:{display:false}}});
    }
    // Chart 6: KM/Trip per hub
    if(hubMetrics.length>1){
      mkChart(pid+'_c6','bar',hubMetrics.map(x=>'Hub '+x.h.replace(/^(AHI|HCI)\s/,'')),
        [{label:'KM/Trip',data:hubMetrics.map(x=>x.m.km_per_trip),backgroundColor:COLORS,borderRadius:4}],
        {plugins:{legend:{display:false}}});
    }
  },50);

  const hasHub=hubMetrics.length>1;
  return `
  <div class="chart-grid">
    <div class="chart-card"><div class="chart-title">📈 Trend Trip per Bulan</div><div class="chart-wrap"><canvas id="${pid}_c1"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">💰 Total Cost per Bulan (Juta)</div><div class="chart-wrap"><canvas id="${pid}_c2"></canvas></div></div>
  </div>
  <div class="chart-grid${hasHub?'-3':''}">
    <div class="chart-card"><div class="chart-title">🍩 Komposisi DO Cust vs Store</div><div class="chart-wrap"><canvas id="${pid}_c3"></canvas></div></div>
    ${hasHub?`
    <div class="chart-card"><div class="chart-title">🏆 Trip per Hub</div><div class="chart-wrap"><canvas id="${pid}_c4"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">💵 Cost/Trip per Hub (Ribu)</div><div class="chart-wrap"><canvas id="${pid}_c5"></canvas></div></div>`:''}
  </div>
  ${hasHub?`<div class="chart-grid">
    <div class="chart-card"><div class="chart-title">🛣️ KM/Trip per Hub</div><div class="chart-wrap"><canvas id="${pid}_c6"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">📊 Ringkasan Ratio per Hub</div>
      <div style="overflow-x:auto;max-height:220px"><table><thead><tr>
        <th>Hub</th><th class="num">DO/Trip</th><th class="num">UJP/Trip</th><th class="num">Cost/Trip</th><th class="num">BBM/Trip</th><th class="num">KM/Trip</th>
      </tr></thead><tbody>${hubMetrics.map(({h,m})=>`<tr>
        <td style="cursor:pointer;color:var(--ahi)" onclick="showPage('${HUB_PAGE[h]||''}')">${h}</td>
        <td class="num ratio-val">${fmtD(m.do_per_trip)}</td><td class="num ratio-val">${fmtM(m.ujp_per_trip)}</td>
        <td class="num ratio-val">${fmtM(m.cost_per_trip)}</td><td class="num ratio-val">${fmtM(m.bbm_per_trip)}</td>
        <td class="num ratio-val">${fmtD(m.km_per_trip)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
  </div>`:''}`;
}

// ── Page tabs (Overview / Insight) ───────────────────────────────────────────
function showPageTab(btn,pid,tab){
  btn.closest('.page-tabs').querySelectorAll('.page-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`#page-${pid} .tab-content`).forEach(t=>t.classList.remove('active'));
  document.getElementById(`${pid}-tab-${tab}`)?.classList.add('active');
}

// ── Build page ────────────────────────────────────────────────────────────────
function buildPage(pid,rows,badgeCls,badgeLabel,title,sub,extra='',hubList){
  const fRows=filtered(rows);
  const header=`<div class="sec-header">
    <span class="badge ${badgeCls}">${badgeLabel}</span>
    <div><div class="sec-title">${title}</div><div class="sec-sub">${sub}</div></div>
  </div>`;
  const tabs=`<div class="page-tabs">
    <button class="page-tab active" onclick="showPageTab(this,'${pid}','overview')">📊 Overview</button>
    <button class="page-tab" onclick="showPageTab(this,'${pid}','insight')">💡 Insight</button>
  </div>`;
  const overview=`<div id="${pid}-tab-overview" class="tab-content active">
    ${kpiHTML(metrics(fRows))}${extra}${secBlocks(pid,fRows)}
  </div>`;
  const insight=`<div id="${pid}-tab-insight" class="tab-content">
    ${buildInsight(pid,fRows,hubList)}
  </div>`;
  document.getElementById('page-'+pid).innerHTML=header+tabs+overview+insight;
}

// ── Rebuild all ───────────────────────────────────────────────────────────────
function rebuildAll(){
  const fAll=filtered(RAW);
  const maF=metrics(filtered(RAW.filter(r=>r.bu==='AHI')));
  const mhF=metrics(filtered(RAW.filter(r=>r.bu==='HCI')));

  const buCompare=`<div class="summary-grid">
    <div class="tbl-wrap"><div class="tbl-head"><div class="tbl-title">📊 ALL HUB AHI vs ALL HUB HCI</div></div>
    <table><thead><tr><th>BU</th><th class="num">Trip</th><th class="num">Total DO</th><th class="num">TAT</th><th class="num">KM</th><th class="num">Total Cost</th><th class="num">BBM</th>${ratioThs}</tr></thead>
    <tbody>
      <tr><td><span class="tag tag-ahi">AHI</span></td><td class="num">${fmt(maF.trips)}</td><td class="num">${fmt(maF.total_do)}</td><td class="num">${maF.tat_avg}</td><td class="num">${fmt(maF.jarak_km)}</td><td class="num">${fmtM(maF.total_cost)}</td><td class="num">${fmtM(maF.bbm_ujp)}</td>${ratioTds(maF)}</tr>
      <tr><td><span class="tag tag-hci">HCI</span></td><td class="num">${fmt(mhF.trips)}</td><td class="num">${fmt(mhF.total_do)}</td><td class="num">${mhF.tat_avg}</td><td class="num">${fmt(mhF.jarak_km)}</td><td class="num">${fmtM(mhF.total_cost)}</td><td class="num">${fmtM(mhF.bbm_ujp)}</td>${ratioTds(mhF)}</tr>
    </tbody></table></div>
    <div class="tbl-wrap"><div class="tbl-head"><div class="tbl-title">📦 Ringkasan Per Hub</div></div>
    <div style="overflow-x:auto"><table><thead><tr><th>Hub</th><th>BU</th><th class="num">Trip</th><th class="num">Total DO</th><th class="num">TAT</th><th class="num">Total Cost</th><th class="num">Cost/Trip</th></tr></thead>
    <tbody>${[...HCI_HUBS,...AHI_HUBS].map(hub=>{
      const hr=fAll.filter(r=>r.hub===hub),m=metrics(hr),bu=RAW.find(r=>r.hub===hub)?.bu||'',pid=HUB_PAGE[hub];
      return `<tr><td style="cursor:pointer;color:var(--ahi)" onclick="showPage('${pid}')">Hub ${hub}</td>
      <td><span class="tag tag-${bu.toLowerCase()}">${bu}</span></td>
      <td class="num">${fmt(m.trips)}</td><td class="num">${fmt(m.total_do)}</td>
      <td class="num">${m.tat_avg}</td><td class="num">${fmtM(m.total_cost)}</td><td class="num ratio-val">${fmtM(m.cost_per_trip)}</td></tr>`;}).join('')}
    </tbody></table></div></div></div>`;

  buildPage('all',RAW,'badge-all','ALL HUB','ALL Hub — Performance & Productivity',
    `${HUBS.length} Hub | AHI(${AHI_HUBS.length}) + HCI(${HCI_HUBS.length}) | *Status LC "New" tidak dihitung`,
    buCompare,[...HCI_HUBS,...AHI_HUBS]);

  buildPage('hci',RAW.filter(r=>r.bu==='HCI'),'badge-hci','HCI','ALL HUB HCI — Performance & Productivity',
    `${HCI_HUBS.length} Hub HCI`,
    hubTableHTML(filtered(RAW.filter(r=>r.bu==='HCI')),HCI_HUBS,'hci'),HCI_HUBS);

  buildPage('ahi',RAW.filter(r=>r.bu==='AHI'),'badge-ahi','AHI','ALL HUB AHI — Performance & Productivity',
    `${AHI_HUBS.length} Hub AHI`,
    hubTableHTML(filtered(RAW.filter(r=>r.bu==='AHI')),AHI_HUBS,'ahi'),AHI_HUBS);

  HCI_HUBS.forEach((hub,i)=>buildPage(`hci_${i}`,RAW.filter(r=>r.hub===hub),'badge-hci','HCI',`Hub ${hub} — Performance & Productivity`,'BU HCI'));
  AHI_HUBS.forEach((hub,i)=>buildPage(`ahi_${i}`,RAW.filter(r=>r.hub===hub),'badge-ahi','AHI',`Hub ${hub} — Performance & Productivity`,'BU AHI'));

  document.getElementById('filterInfo').textContent=`${filtered(RAW).length.toLocaleString('id-ID')} dari ${RAW.length.toLocaleString('id-ID')} trip`;
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id)?.classList.add('active');
  document.querySelectorAll('.sidebar-item').forEach(t=>{if(t.dataset.page===id)t.classList.add('active');});
}

rebuildAll();
showPage('all');
</script>
</body>
</html>
